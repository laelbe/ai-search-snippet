name: Deploy to Cloudflare Workers

on:
  workflow_run:
    workflows: ["Create Release"]
    types: [completed]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Ensure Wrangler config and entrypoint exist
        run: |
          set -euo pipefail
          if [ ! -f wrangler.jsonc ]; then
            echo "wrangler.jsonc not found. Add it to the repo to enable deployments." >&2
            exit 1
          fi

          if [ ! -f worker.js ]; then
            echo "worker.js not found (wrangler.jsonc main is ./worker.js). Ensure it exists at repo root." >&2
            exit 1
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build:app

      - name: Ensure assets output exists
        run: |
          set -euo pipefail
          if [ ! -d dist-app ]; then
            echo "dist-app not found. Expected Vite app build output at dist-app/." >&2
            exit 1
          fi

      - name: Deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy --config wrangler.jsonc
